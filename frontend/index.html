<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEURO_SNAKE // TERMINAL</title>
  <script src="https://cdn.tailwindcss.com"></script>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    body {
      font-family: 'Share Tech Mono', monospace;
      background-color: #050505;
      color: #00ffff;
      overflow: hidden;
      margin: 0;
      padding: 0;
    }

    /* Glitch Animations */
    @keyframes glitch-anim-1 {
      0% { clip-path: inset(20% 0 80% 0); transform: translate(-2px, 1px); }
      20% { clip-path: inset(60% 0 10% 0); transform: translate(2px, -1px); }
      40% { clip-path: inset(40% 0 50% 0); transform: translate(-2px, 2px); }
      60% { clip-path: inset(80% 0 5% 0); transform: translate(2px, -2px); }
      80% { clip-path: inset(10% 0 70% 0); transform: translate(-1px, 1px); }
      100% { clip-path: inset(30% 0 50% 0); transform: translate(1px, -1px); }
    }

    @keyframes glitch-anim-2 {
      0% { clip-path: inset(10% 0 60% 0); transform: translate(2px, -1px); }
      20% { clip-path: inset(30% 0 20% 0); transform: translate(-2px, 1px); }
      40% { clip-path: inset(70% 0 10% 0); transform: translate(2px, -2px); }
      60% { clip-path: inset(20% 0 50% 0); transform: translate(-2px, 2px); }
      80% { clip-path: inset(50% 0 30% 0); transform: translate(1px, -1px); }
      100% { clip-path: inset(5% 0 80% 0); transform: translate(-1px, 1px); }
    }

    .glitch-wrapper {
      position: relative;
      display: inline-block;
    }

    .glitch-text {
      position: relative;
      color: #00ffff;
      font-weight: bold;
    }

    .glitch-text::before,
    .glitch-text::after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #050505;
    }

    .glitch-text::before {
      left: 2px;
      text-shadow: -2px 0 #ff00ff;
      animation: glitch-anim-1 2s infinite linear alternate-reverse;
    }

    .glitch-text::after {
      left: -2px;
      text-shadow: -2px 0 #00ffff;
      animation: glitch-anim-2 3s infinite linear alternate-reverse;
    }

    /* Scanlines */
    .scanlines {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0),
        rgba(255, 255, 255, 0) 50%,
        rgba(0, 0, 0, 0.2) 50%,
        rgba(0, 0, 0, 0.2)
      );
      background-size: 100% 4px;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.6;
    }

    /* CRT Flicker */
    @keyframes flicker {
      0% { opacity: 0.95; }
      5% { opacity: 0.85; }
      10% { opacity: 0.95; }
      15% { opacity: 1; }
      50% { opacity: 0.95; }
      55% { opacity: 0.9; }
      60% { opacity: 1; }
      100% { opacity: 1; }
    }

    .crt-flicker {
      animation: flicker 0.15s infinite;
    }

    /* Custom Scrollbar for terminal feel */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #000;
      border-left: 1px solid #333;
    }
    ::-webkit-scrollbar-thumb {
      background: #00ffff;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #ff00ff;
    }
  </style>
</head>
<body>
  <div class="scanlines"></div>
  <div id="root" class="crt-flicker w-full h-screen flex flex-col"></div>
  <script type="module" src="./index.tsx"></script>
<script type="module" src="/index.js"></script></body>
</html>
